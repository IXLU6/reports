<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IXLU 运营中枢</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #5b8df8;
      --bg: #f5f7ff;
      --card-bg: #ffffff;
      --text: #2d3748;
      --text-light: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 30px rgba(91,141,248,0.25);
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      font-size: 16px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      padding: 50px 30px;
      text-align: center;
      color: white;
    }
    .header h1 { font-size: 2.8rem; margin-bottom: 12px; }
    .header p { font-size: 1.2rem; opacity: 0.95; }

    /* Search */
    .search-section {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 0 30px 40px;
    }
    .search-box {
      max-width: 700px;
      margin: 0 auto;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 18px 60px 18px 25px;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      outline: none;
    }
    .search-box button {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      color: white;
      font-size: 1.1rem;
    }

    /* Hot News */
    .hot-news-section { padding: 30px; }
    .hot-news-header { text-align: center; margin-bottom: 25px; }
    .hot-news-header h2 { font-size: 1.8rem; margin-bottom: 8px; }
    .hot-news-header p { color: var(--text-light); font-size: 1.05rem; }
    .hot-news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 22px;
      max-width: 1600px;
      margin: 0 auto;
    }
    .news-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }
    .news-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--border);
    }
    .news-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .news-title i {
      font-size: 1.6rem;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      color: white;
    }
    .news-title h3 { font-size: 1.25rem; }
    .news-refresh {
      background: var(--border);
      border: none;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text-light);
      transition: all 0.3s;
    }
    .news-refresh:hover { background: var(--primary); color: white; }
    .news-list { list-style: none; }
    .news-list li {
      padding: 12px 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.05rem;
      cursor: pointer;
      transition: background 0.2s;
      border-radius: 8px;
    }
    .news-list li:last-child { border-bottom: none; }
    .news-list li:hover { background: #f8f9ff; padding-left: 12px; }
    .news-rank {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.88rem;
      font-weight: bold;
      color: white;
      flex-shrink: 0;
    }
    .rank-1 { background: #ff4757; }
    .rank-2 { background: #ff6b81; }
    .rank-3 { background: #ffa502; }
    .rank-other { background: #748ffc; }
    .news-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 1rem; font-weight: 500; }
    .news-heat { font-size: 0.85rem; color: var(--text-light); flex-shrink: 0; }
    .news-hot-tag {
      background: linear-gradient(135deg, #ff4757, #ff6b81);
      color: white;
      font-size: 0.72rem;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .news-loading {
      text-align: center;
      padding: 30px;
      color: var(--text-light);
      font-size: 1rem;
    }
    .news-error {
      text-align: center;
      padding: 20px;
      color: var(--text-light);
      font-size: 0.95rem;
    }
    .news-source-tag {
      font-size: 0.75rem;
      color: #4CAF50;
      background: #e8f5e9;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 6px;
      font-weight: 600;
    }

    /* Main */
    .main-container {
      display: flex;
      max-width: 1600px;
      margin: 0 auto;
      padding: 30px;
      gap: 30px;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      position: sticky;
      top: 20px;
      height: calc(100vh - 40px);
      overflow-y: auto;
    }
    .sidebar-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 25px;
      border-radius: var(--radius);
      margin-bottom: 20px;
      text-align: center;
    }
    .sidebar-header h2 { font-size: 1.4rem; margin-bottom: 8px; }
    .sidebar-header p { font-size: 0.95rem; opacity: 0.9; }
    .nav-list { list-style: none; background: var(--card-bg); border-radius: var(--radius); padding: 15px; box-shadow: var(--shadow); }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-radius: 12px; cursor: pointer;
      transition: all 0.3s; margin-bottom: 6px; font-size: 1rem; font-weight: 500;
    }
    .nav-item:hover, .nav-item.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; transform: translateX(5px);
    }
    .nav-item i { font-size: 1.2rem; width: 28px; text-align: center; }
    .nav-item .count {
      margin-left: auto;
      background: rgba(91,141,248,0.15);
      color: var(--primary);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .nav-item:hover .count, .nav-item.active .count { background: rgba(255,255,255,0.25); color: white; }
    .total-badge {
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-left: auto;
    }

    .content { flex: 1; min-width: 0; }
    .section { margin-bottom: 50px; scroll-margin-top: 30px; }
    .section-header {
      display: flex; align-items: center; gap: 15px;
      margin-bottom: 25px; padding: 20px 25px;
      background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
    }
    .section-icon {
      width: 58px; height: 58px; border-radius: 15px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem; color: white;
    }
    .section-title h2 { font-size: 1.55rem; margin-bottom: 5px; }
    .section-title p { color: var(--text-light); font-size: 1rem; }

    /* Tools Grid */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(215px, 1fr));
      gap: 18px;
    }
    .tool-card {
      background: var(--card-bg);
      border-radius: 18px;
      padding: 24px 18px;
      text-align: center;
      box-shadow: var(--shadow);
      transition: all 0.3s;
      cursor: pointer;
      position: relative;
      border: 2px solid transparent;
      overflow: hidden;
    }
    .tool-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .tool-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
      border-color: var(--primary);
    }
    .tool-card:hover::before { opacity: 1; }
    .tool-emoji {
      font-size: 3.4rem;
      margin-bottom: 14px;
      display: block;
      line-height: 1;
    }
    .tool-card h4 {
      font-size: 1.18rem; margin-bottom: 8px;
      color: var(--text); font-weight: 600;
    }
    .tool-card p {
      font-size: 0.95rem; color: var(--text-light);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .tool-delete {
      position: absolute;
      top: 8px; right: 8px;
      width: 28px; height: 28px;
      background: #ff4757; color: white;
      border: none; border-radius: 50%;
      cursor: pointer; font-size: 0.9rem;
      opacity: 0; transition: all 0.3s;
      display: flex; align-items: center; justify-content: center;
    }
    .tool-card:hover .tool-delete { opacity: 1; }
    .tool-delete:hover { background: #ff3344; transform: scale(1.15); }

    .add-tool-card {
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);
      border: 2px dashed var(--primary);
      border-radius: 18px;
      padding: 24px 18px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      min-height: 165px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .add-tool-card:hover {
      background: linear-gradient(135deg, #e8f0fe 0%, #d4e3fc 100%);
      transform: translateY(-5px);
    }
    .add-tool-card i { font-size: 2.8rem; color: var(--primary); margin-bottom: 12px; }
    .add-tool-card span { font-size: 1.08rem; color: var(--primary); font-weight: 500; }

    /* Modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(5px);
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--card-bg); border-radius: var(--radius);
      padding: 35px; width: 90%; max-width: 450px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.3);
      animation: modalIn 0.3s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.9) translateY(-20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal h3 { font-size: 1.4rem; margin-bottom: 25px; text-align: center; }
    .modal input, .modal select {
      width: 100%; padding: 14px 18px;
      border: 2px solid var(--border); border-radius: 12px;
      margin-bottom: 15px; font-size: 1rem; outline: none;
      transition: border-color 0.3s;
    }
    .modal input:focus, .modal select:focus { border-color: var(--primary); }
    .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
    .modal-buttons button {
      flex: 1; padding: 14px; border: none; border-radius: 12px;
      font-size: 1rem; cursor: pointer; transition: all 0.3s; font-weight: 500;
    }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: #d1d5db; }
    .password-hint { text-align: center; color: var(--text-light); font-size: 0.9rem; margin-top: 10px; }

    .footer { text-align: center; padding: 40px 30px; color: var(--text-light); font-size: 1rem; background: var(--card-bg); margin-top: 50px; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #667eea 0%, #764ba2 100%); border-radius: 4px; }

    @media (max-width: 1024px) {
      .main-container { flex-direction: column; }
      .sidebar { width: 100%; position: static; height: auto; }
      .nav-list { display: flex; flex-wrap: wrap; gap: 8px; }
      .nav-item { flex: 1; min-width: 140px; margin-bottom: 0; }
      .hot-news-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 768px) {
      .header h1 { font-size: 2rem; }
      .tools-grid { grid-template-columns: repeat(2, 1fr); }
      .hot-news-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>🚀 IXLU 运营中枢</h1>
    <p>你的专属运营工具箱 · 一站式跨境电商资源导航</p>
  </header>

  <section class="search-section">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 搜索工具、网站、资源..." onkeypress="if(event.key==='Enter')searchTools()">
      <button onclick="searchTools()"><i class="fas fa-search"></i></button>
    </div>
  </section>

  <!-- Hot News -->
  <section class="hot-news-section">
    <div class="hot-news-header">
      <h2>🔥 每日热点速览</h2>
      <p>实时同步各大平台真实热点 · 点击任意条目跳转查看详情</p>

    <div class="hot-news-grid">
      <div class="news-card">

      </div>

      <div class="news-card">
        <div class="news-header">
          <div class="news-title">
            <i class="fas fa-fire" style="background:#ff4757;"></i>

          <button class="news-refresh" onclick="fetchDouyin()"><i class="fas fa-sync-alt"></i> 刷新</button>
        </div>
        <ul class="news-list" id="douyinNews">
          <li class="news-loading"><i class="fas fa-spinner fa-spin"></i> 正在加载抖音热榜...</li>
        </ul>
      </div>

      <div class="news-card">
        <div class="news-header">
          <div class="news-title">
            <i class="fas fa-search" style="background:#2932e1;"></i>
            <h3>百度热点</h3>
          </div>
          <button class="news-refresh" onclick="fetchBaidu()"><i class="fas fa-sync-alt"></i> 刷新</button>
        </div>
        <ul class="news-list" id="baiduNews">
          <li class="news-loading"><i class="fas fa-spinner fa-spin"></i> 正在加载百度热点...</li>
        </ul>
      </div>

      <div class="news-card">
        <div class="news-header">
          <div class="news-title">
            <i class="fab fa-zhihu" style="background:#0066ff;"></i>
            <h3>知乎热榜</h3>
          </div>
          <button class="news-refresh" onclick="fetchZhihu()"><i class="fas fa-sync-alt"></i> 刷新</button>
        </div>
        <ul class="news-list" id="zhihuNews">
          <li class="news-loading"><i class="fas fa-spinner fa-spin"></i> 正在加载知乎热榜...</li>
        </ul>
      </div>
    </div>
  </section>

  <div class="main-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>📂 分类导航</h2>
        <p id="totalTools">共加载中...</p>
      </div>
      <ul class="nav-list" id="navList"></ul>
    </aside>
    <main class="content" id="content"></main>
  </div>

  <footer class="footer">
    <p>🚀 IXLU 运营中枢 · 让运营更高效</p>
    <p>持续更新中，收藏本页随时访问</p>
  </footer>

  <!-- Add Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h3>➕ 添加新工具</h3>
      <input type="password" id="addPassword" placeholder="🔒 请输入管理密码">
      <input type="text" id="toolName" placeholder="📛 工具名称">
      <input type="url" id="toolUrl" placeholder="🔗 工具链接 (https://...)">
      <input type="text" id="toolDesc" placeholder="📝 工具描述">
      <input type="text" id="toolEmoji" placeholder="😀 工具图标 emoji（选填）">
      <select id="toolCategory"></select>
      <p class="password-hint">管理密码：124578</p>
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="closeModal('addModal')">取消</button>
        <button class="btn-primary" onclick="addTool()">添加</button>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h3>🗑️ 删除工具</h3>
      <input type="password" id="deletePassword" placeholder="🔒 请输入管理密码">
      <p class="password-hint" id="deleteToolName">管理密码：124578</p>
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="closeModal('deleteModal')">取消</button>
        <button class="btn-primary" onclick="confirmDelete()">确认删除</button>
      </div>
    </div>
  </div>

<script>
// ======================== DATA ========================
const categories = [
  {id:'reports', name:'📊 报告存档', icon:'fa-chart-line', color:'linear-gradient(135deg,#667eea,#764ba2)', desc:'生成的调研报告'},
  {id:'alibaba', name:'🅰️ 阿里国际站', icon:'fa-globe', color:'linear-gradient(135deg,#ff6b6b,#ee5a24)', desc:'国际站运营工具'},
  {id:'backend', name:'⚙️ 后台快捷', icon:'fa-cog', color:'linear-gradient(135deg,#4834d4,#686de0)', desc:'平台后台入口'},
  {id:'google', name:'🌐 谷歌&建站', icon:'fa-google', color:'linear-gradient(135deg,#00d2d3,#01a3a4)', desc:'建站与SEO工具'},
  {id:'ai', name:'🤖 AI人工智能', icon:'fa-robot', color:'linear-gradient(135deg,#5f27cd,#341f97)', desc:'AI工具合集'},
  {id:'plugins', name:'🧩 浏览器插件', icon:'fa-puzzle-piece', color:'linear-gradient(135deg,#ff9f43,#ee5a24)', desc:'实用插件推荐'},
  {id:'translate', name:'🌍 翻译网站', icon:'fa-language', color:'linear-gradient(135deg,#10ac84,#1dd1a1)', desc:'多语言翻译'},
  {id:'design', name:'🎨 设计网站', icon:'fa-paint-brush', color:'linear-gradient(135deg,#ff6b81,#ff4757)', desc:'设计资源'},
  {id:'tools', name:'🔧 常用工具', icon:'fa-tools', color:'linear-gradient(135deg,#747d8c,#57606f)', desc:'效率工具'},
  {id:'social', name:'📱 社交媒体', icon:'fa-share-alt', color:'linear-gradient(135deg,#3742fa,#2f3542)', desc:'社媒平台'},
  {id:'business', name:'💼 业务常用', icon:'fa-briefcase', color:'linear-gradient(135deg,#2ed573,#7bed9f)', desc:'业务工具'},
  {id:'logistics', name:'🚚 物流相关', icon:'fa-shipping-fast', color:'linear-gradient(135deg,#ffa502,#eccc68)', desc:'物流查询'},
  {id:'payment', name:'💳 跨境收款', icon:'fa-credit-card', color:'linear-gradient(135deg,#7bed9f,#2ed573)', desc:'收款工具'},
  {id:'company', name:'🏢 企查查', icon:'fa-building', color:'linear-gradient(135deg,#70a1ff,#5352ed)', desc:'企业查询'},
  {id:'ip', name:'⚖️ 侵权专利', icon:'fa-balance-scale', color:'linear-gradient(135deg,#ff4757,#ff6b81)', desc:'知识产权'},
  {id:'email', name:'✉️ 话术邮件', icon:'fa-envelope', color:'linear-gradient(135deg,#5352ed,#3742fa)', desc:'邮件模板'},
  {id:'exhibition', name:'🏛️ 展会相关', icon:'fa-landmark', color:'linear-gradient(135deg,#ff6348,#ff7f50)', desc:'展会信息'},
  {id:'amazon', name:'📦 亚马逊', icon:'fa-amazon', color:'linear-gradient(135deg,#ff9900,#ff6600)', desc:'亚马逊工具'},
  {id:'blacktech', name:'⚡ 跨境黑科技', icon:'fa-bolt', color:'linear-gradient(135deg,#a55eea,#8854d0)', desc:'特殊工具'},
  {id:'supply', name:'🛒 货源平台', icon:'fa-boxes', color:'linear-gradient(135deg,#26de81,#20bf6b)', desc:'货源渠道'},
  {id:'books', name:'📚 推荐书单', icon:'fa-book', color:'linear-gradient(135deg,#fd79a8,#e84393)', desc:'运营书籍'},
  {id:'entertainment', name:'🎬 影音娱乐', icon:'fa-film', color:'linear-gradient(135deg,#0984e3,#74b9ff)', desc:'影视资源'}
];

  el.innerHTML = '<li class="news-loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</li>';
  try {
    const resp = await fetch('https://tenapi.cn/v2/weibo-hotlist', { timeout: 5000 });
    if (resp.ok) {
      const data = await resp.json();
      const items = data.data || data.list || [];
      if (items.length > 0) {
        renderNewsList('weiboNews', items.slice(0, 8), true);
        return;
      }
    }
    throw new Error('no data');
  } catch(e) {
    el.innerHTML = renderFallback(WEIBO_FALLBACK, 'weibo');
  }
}

async function fetchBaidu() {
  const el = document.getElementById('baiduNews');
  el.innerHTML = '<li class="news-loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</li>';
  try {
    const resp = await fetch('https://top.baidu.com/api/rankboard/hot-list?boardType=realtime', {
      headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' },
      timeout: 5000
    });
    if (resp.ok) {
      const data = await resp.json();
      const items = data.data || data.toplist || [];
      if (items.length > 0) {
        renderNewsList('baiduNews', items.slice(0, 8), false, item => ({
          word: item.word,
          hot_value: item.hotScore ? item.hotScore + '万' : ''
        }));
        return;
      }
    }
    throw new Error('no data');
  } catch(e) {
    // Try alternative Baidu API via allorigins proxy
    try {
      const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://top.baidu.com/board?tab=realtime');
      const resp = await fetch(proxyUrl, { timeout: 8000 });
      if (resp.ok) {
        const text = await resp.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        const items = [];
        doc.querySelectorAll('.c-single-media-article').forEach((el, i) => {
          if (i < 8) {
            const title = el.querySelector('.c-title')?.textContent?.trim() || '';
            const heat = el.querySelector('.c-hot')?.textContent?.trim() || '';
            if (title) items.push({word: title, hot_value: heat});
          }
        });
        if (items.length > 0) {
          renderNewsList('baiduNews', items, false);
          return;
        }
      }
    } catch(e2) {}
    el.innerHTML = renderFallback(BAIDU_FALLBACK, 'baidu');
  }
}

async function fetchZhihu() {
  const el = document.getElementById('zhihuNews');
  el.innerHTML = '<li class="news-loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</li>';
  try {
    const resp = await fetch('https://www.zhihu.com/api/v4/topics/19550517/hot-lists/total?limit=10', {
      headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' },
      timeout: 6000
    });
    if (resp.ok) {
      const data = await resp.json();
      const items = data.data || [];
      if (items.length > 0) {
        renderNewsList('zhihuNews', items.slice(0, 8), false, item => ({
          word: item.target?.title || item.title || '',
          hot_value: item.target?.vote_count ? item.target.vote_count + '票' : ''
        }));
        return;
      }
    }
    throw new Error('no data');
  } catch(e) {
    // Try via allorigins proxy
    try {
      const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://www.zhihu.com/hot');
      const resp = await fetch(proxyUrl, { timeout: 8000 });
      if (resp.ok) {
        const text = await resp.text();
        const match = text.match(/"question":\s*\{"title":\s*"([^"]+)"/g);
        if (match && match.length > 0) {
          const items = match.slice(0, 8).map(m => ({word: m.match(/"title":\s*"([^"]+)"/)[1], hot_value: ''}));
          if (items.length > 0) {
            renderNewsList('zhihuNews', items, false);
            return;
          }
        }
      }
    } catch(e2) {}
    el.innerHTML = renderFallback(ZHIHU_FALLBACK, 'zhihu');
  }
}

function renderNewsList(elementId, items, isLive, mapper) {
  const el = document.getElementById(elementId);
  const platform = elementId.replace('News', '');
  el.innerHTML = items.map((item, i) => {
    const rank = i + 1;
    let text, heat;
    if (mapper) {
      const mapped = mapper(item);
      text = mapped.word;
      heat = mapped.hot_value;
    } else {
      text = item.word || item.title || item.name || String(item);
      heat = item.hot_value || item.hot || item.count || item.score || '';
    }
    const tag = isLive ? '<span class="news-source-tag">🔴 LIVE</span>' : '';
    return `<li onclick="window.open('${LINKS[platform]}', '_blank')">
      <span class="news-rank rank-${rank <= 3 ? rank : 'other'}">${rank}</span>
      <span class="news-text">${text}${tag}</span>
      ${rank <= 3 ? '<span class="news-hot-tag">🔥</span>' : ''}
      <span class="news-heat">${heat}</span>
    </li>`;
  }).join('');
}

function renderFallback(items, platform) {
  return items.map((item, i) => {
    const rank = i + 1;
    const isHot = item.heat && item.heat.includes('🔥');
    const text = item.text;
    const heat = item.heat || '';
    return `<li onclick="window.open('${LINKS[platform]}', '_blank')">
      <span class="news-rank rank-${rank <= 3 ? rank : 'other'}">${rank}</span>
      <span class="news-text">${text}</span>
      ${rank <= 3 ? '<span class="news-hot-tag">🔥</span>' : ''}
      <span class="news-heat">${heat}</span>
    </li>`;
  }).join('');
}

// ======================== NAV & CONTENT ========================
function renderNav() {
  document.getElementById('navList').innerHTML = categories.map(cat => `
    <li class="nav-item" data-category="${cat.id}" onclick="scrollToSection('${cat.id}')">
      <i class="fas ${cat.icon}"></i>
      <span>${cat.name}</span>
      <span class="count">${(tools[cat.id]||[]).length}</span>
    </li>
  `).join('');
}

function updateTotal() {
  let total = 0;
  categories.forEach(cat => { total += (tools[cat.id]||[]).length; });
  document.getElementById('totalTools').textContent = `共 ${total} 个工具`;
}

function renderContent() {
  document.getElementById('content').innerHTML = categories.map(cat => `
    <section class="section" id="${cat.id}">
      <div class="section-header">
        <div class="section-icon" style="background:${cat.color}">
          <i class="fas ${cat.icon}"></i>
        </div>
        <div class="section-title">
          <h2>${cat.name}</h2>
          <p>${cat.desc} · ${(tools[cat.id]||[]).length} 个工具</p>
        </div>
      </div>
      <div class="tools-grid">
        ${(tools[cat.id]||[]).map((tool, index) => `
          <div class="tool-card" onclick="openTool('${tool.url}')">
            <button class="tool-delete" onclick="event.stopPropagation(); showDeleteModal('${cat.id}',${index},'${tool.name.replace(/'/g,"\\'")}')">×</button>
            <span class="tool-emoji">${tool.emoji}</span>
            <h4>${tool.name}</h4>
            <p>${tool.desc}</p>
          </div>
        `).join('')}
        <div class="add-tool-card" onclick="showAddModal('${cat.id}')">
          <i class="fas fa-plus-circle"></i>
          <span>添加工具</span>
        </div>
      </div>
    </section>
  `).join('');

  document.getElementById('toolCategory').innerHTML = '<option value="">📂 选择分类</option>' +
    categories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('');
}

function scrollToSection(id) {
  document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
}

function setupScrollSpy() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        document.querySelector(`.nav-item[data-category="${entry.target.id}"]`)?.classList.add('active');
      }
    });
  }, { threshold: 0.3 });
  document.querySelectorAll('.section').forEach(sec => observer.observe(sec));
}

function openTool(url) {
  if (url && url !== '#') window.open(url, '_blank');
}

// ======================== MODALS ========================
function showAddModal(catId) {
  document.getElementById('addModal').classList.add('active');
  if (catId) document.getElementById('toolCategory').value = catId;
}

function showDeleteModal(catId, index, name) {
  currentDeleteTarget = { catId, index };
  document.getElementById('deleteToolName').textContent = `将删除: ${name}`;
  document.getElementById('deleteModal').classList.add('active');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
  document.querySelectorAll('.modal input').forEach(i => i.value = '');
}

function addTool() {
  const pw = document.getElementById('addPassword').value;
  const name = document.getElementById('toolName').value.trim();
  const url = document.getElementById('toolUrl').value.trim();
  const desc = document.getElementById('toolDesc').value.trim();
  const emoji = document.getElementById('toolEmoji').value.trim();
  const cat = document.getElementById('toolCategory').value;

  if (pw !== CORRECT_PASSWORD) { alert('密码错误！'); return; }
  if (!name || !url || !cat) { alert('请填写名称、链接和分类！'); return; }

  if (!tools[cat]) tools[cat] = [];
  tools[cat].push({ name: emoji ? `${emoji} ${name}` : name, url, desc: desc || '暂无描述', emoji: emoji || '🔧' });

  renderNav();
  renderContent();
  updateTotal();
  closeModal('addModal');
  alert('工具添加成功！');
}

function confirmDelete() {
  const pw = document.getElementById('deletePassword').value;
  if (pw !== CORRECT_PASSWORD) { alert('密码错误！'); return; }
  if (currentDeleteTarget) {
    tools[currentDeleteTarget.catId].splice(currentDeleteTarget.index, 1);
    renderNav();
    renderContent();
    updateTotal();
    closeModal('deleteModal');
    alert('已删除！');
    currentDeleteTarget = null;
  }
}

function searchTools() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) return;
  let found = false;
  document.querySelectorAll('.section').forEach(sec => {
    const cards = sec.querySelectorAll('.tool-card');
    let has = false;
    cards.forEach(c => {
      const match = c.textContent.toLowerCase().includes(q);
      c.style.display = match ? 'block' : 'none';
      if (match) { has = true; found = true; }
    });
    sec.style.display = has ? 'block' : 'none';
  });
  if (!found) alert('未找到匹配的工具，试试其他关键词');
}

document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) {
    document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
  }
});

init();
</script>
