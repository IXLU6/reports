<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IXLU 运营中枢</title>
<style>
  :root {
    --bg: #080c14;
    --surface: #0f1623;
    --surface2: #162033;
    --surface3: #1e2d45;
    --border: #1e2d45;
    --accent: #4a9eff;
    --accent2: #7c6aff;
    --gold: #f0b94a;
    --text: #e0e8f4;
    --text2: #7a90b0;
    --text3: #4a5a78;
    --green: #34d399;
    --red: #f87171;
    --orange: #ffa040;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -5%, rgba(74,158,255,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 90% 15%, rgba(124,106,255,0.07) 0%, transparent 50%);
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,12,20,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 58px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-brand {
    display: flex; align-items: center; gap: 10px;
    font-size: 17px; font-weight: 700;
  }
  .header-brand .logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 900; color: #fff;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-right .stat-pill {
    font-size: 12px; color: var(--text2);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 20px;
  }
  .header-right .stat-pill span { color: var(--accent); font-weight: 700; }

  /* ── Layout ── */
  .layout { display: flex; flex: 1; }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 58px;
    height: calc(100vh - 58px);
    overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

  .sidebar-section { margin-bottom: 8px; }
  .sidebar-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
    padding: 8px 20px 4px;
  }
  .sidebar-nav { display: flex; flex-direction: column; }
  .sidebar-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 20px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    border: none;
    background: none;
    text-align: left;
    width: 100%;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    font-family: inherit;
    border-radius: 0;
  }
  .sidebar-btn:hover { color: var(--text); background: rgba(74,158,255,0.05); }
  .sidebar-btn.active {
    color: var(--accent);
    background: rgba(74,158,255,0.08);
    border-left-color: var(--accent);
  }
  .sidebar-btn .s-icon { font-size: 15px; width: 20px; text-align: center; }
  .sidebar-btn .s-count {
    margin-left: auto;
    font-size: 10px;
    background: var(--surface3);
    color: var(--text3);
    padding: 2px 6px;
    border-radius: 10px;
  }
  .sidebar-btn.active .s-count { background: rgba(74,158,255,0.2); color: var(--accent); }

  /* ── Main ── */
  .main { flex: 1; min-width: 0; padding: 28px 32px 60px; overflow-x: hidden; }

  /* ── Hero Strip ── */
  .hero-strip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 28px;
    margin-bottom: 28px;
    display: flex; align-items: center; gap: 24px;
  }
  .hero-strip h1 {
    font-size: 22px; font-weight: 800;
    flex: 1;
  }
  .hero-strip h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hero-strip .hero-desc { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .hero-tabs { display: flex; gap: 6px; }
  .mini-tab {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    text-decoration: none;
  }
  .mini-tab:hover { color: var(--accent); border-color: var(--accent); }
  .mini-tab.report-tab {
    background: rgba(240,185,74,0.1);
    border-color: rgba(240,185,74,0.3);
    color: var(--gold);
  }
  .mini-tab.report-tab:hover { background: rgba(240,185,74,0.2); }

  /* ── Page Title ── */
  .page-title {
    font-size: 18px; font-weight: 700; margin-bottom: 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .page-title::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* ── Cards ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }
  .tool-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    transition: all 0.2s;
    display: flex; flex-direction: column; gap: 8px;
    cursor: pointer;
  }
  .tool-card:hover {
    border-color: var(--accent);
    background: rgba(74,158,255,0.04);
    transform: translateY(-1px);
  }
  .tool-card-top { display: flex; align-items: center; gap: 10px; }
  .tool-favicon {
    width: 30px; height: 30px;
    border-radius: 6px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .tool-favicon img { width: 18px; height: 18px; object-fit: contain; }
  .tool-name {
    font-size: 13px; font-weight: 600; color: var(--text);
    line-height: 1.3;
    flex: 1;
  }
  .tool-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .badge-tool { background: rgba(74,158,255,0.15); color: var(--accent); }
  .badge-alibaba { background: rgba(240,185,74,0.15); color: var(--gold); }
  .badge-google { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge-social { background: rgba(167,139,250,0.15); color: #a78bfa; }
  .badge-ai { background: rgba(251,146,60,0.15); color: var(--orange); }
  .badge-finance { background: rgba(56,189,248,0.15); color: #38bdf8; }
  .badge-logistics { background: rgba(74,222,128,0.15); color: #4ade80; }
  .badge-design { background: rgba(244,114,182,0.15); color: #f472b6; }
  .badge-translate { background: rgba(96,165,250,0.15); color: #60a5fa; }
  .badge-plugin { background: rgba(167,139,250,0.15); color: #a78bfa; }
  .badge-amazon { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .badge-common { background: rgba(148,163,184,0.15); color: var(--text2); }
  .tool-desc { font-size: 11px; color: var(--text2); line-height: 1.4; }
  .tool-url { font-size: 10px; color: var(--text3); word-break: break-all; }

  /* ── Report Cards ── */
  .report-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    transition: all 0.2s;
  }
  .report-card:hover { border-color: var(--gold); transform: translateY(-1px); }
  .report-type {
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--gold); margin-bottom: 8px;
  }
  .report-name { font-size: 14px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
  .report-desc { font-size: 12px; color: var(--text2); margin-bottom: 12px; line-height: 1.5; }
  .report-footer { display: flex; align-items: center; justify-content: space-between; }
  .report-date { font-size: 11px; color: var(--text3); }
  .btn-report {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid rgba(240,185,74,0.4);
    background: rgba(240,185,74,0.08);
    color: var(--gold);
    font-size: 12px; font-weight: 600;
    text-decoration: none;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-report:hover { background: rgba(240,185,74,0.18); }

  /* ── Empty ── */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--text3); font-size: 13px;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 20px;
    color: var(--text3);
    font-size: 11px;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { padding: 20px 16px; }
    .cards-grid { grid-template-columns: 1fr 1fr; }
    .hero-strip { flex-direction: column; align-items: flex-start; }
  }
</style>

// ── 本地存储 ──
const REPORTS_KEY = 'ixlu_reports_v2';
const REPORTS_INIT = [
  { name:'Karseell 卡塞尔品牌调研报告', url:'https://ixlu6.github.io/reports/karseell-brand-report.html', type:'品牌', desc:'深海军蓝+琥珀金 · Intelligence风格', date:'2026-04-15' },
  { name:'全球美发热门成分调研报告', url:'https://ixlu6.github.io/reports/global-ingredients-report.html', type:'成分', desc:'深蓝绿+薄荷绿 · 科技健康风格', date:'2026-04-15' },
  { name:'全球沐浴露身体乳调研报告', url:'https://ixlu6.github.io/reports/bath-body-report.html', type:'市场', desc:'珊瑚粉+暖橙色 · 沐浴露专属风格', date:'2026-04-15' },
  { name:'洗发水新兴品牌调研报告', url:'https://ixlu6.github.io/reports/shampoo-brand-report.html', type:'品牌', desc:'2026-04-15新增', date:'2026-04-15' },
];

function getReports() {
  try {
    const stored = JSON.parse(localStorage.getItem(REPORTS_KEY));
    if (stored && stored.length > 0) return stored;
  } catch(e) {}
  localStorage.setItem(REPORTS_KEY, JSON.stringify(REPORTS_INIT));
  return REPORTS_INIT;
}
function saveReports(arr) { localStorage.setItem(REPORTS_KEY, JSON.stringify(arr)); }

// ── 全局工具计数 ──
function updateTotalCount() {
  let total = 0;
  Object.values(PAGES).forEach(p => { if (p.tools) total += p.tools.length; });
  document.getElementById('stat-total').textContent = total;
}

// ── 渲染 ──
function renderReportsHome() {
  const reports = getReports();
  document.getElementById('count-reports').textContent = reports.length;
  const grid = document.getElementById('reports-grid-home');
  if (!grid) return;
  grid.innerHTML = reports.length === 0
    ? '<div class="empty"><div class="empty-icon">📊</div><p>还没有报告，发给我即可自动添加</p></div>'
    : reports.map((r,i) => `
        <div class="report-card">
          <div class="report-type">${escHtml(r.type)}报告</div>
          <div class="report-name">${escHtml(r.name)}</div>
          ${r.desc ? `<div class="report-desc">${escHtml(r.desc)}</div>` : ''}
          <div class="report-footer">
            <span class="report-date">${r.date||''}</span>
            <a class="btn-report" href="${escHtml(r.url)}" target="_blank">查看 →</a>
          </div>
        </div>`).join('');
}

function renderReports() {
  const reports = getReports();
  document.getElementById('count-reports').textContent = reports.length;
  const grid = document.getElementById('reports-grid');
  if (!grid) return;
  grid.innerHTML = reports.length === 0
    ? '<div class="empty"><div class="empty-icon">📊</div><p>还没有报告</p></div>'
    : reports.map((r,i) => `
        <div class="report-card">
          <div class="report-type">${escHtml(r.type)}报告</div>
          <div class="report-name">${escHtml(r.name)}</div>
          ${r.desc ? `<div class="report-desc">${escHtml(r.desc)}</div>` : ''}
          <div class="report-footer">
            <span class="report-date">${r.date||''}</span>
            <a class="btn-report" href="${escHtml(r.url)}" target="_blank">查看 →</a>
          </div>
          <div style="margin-top:8px;text-align:right;">
            <button onclick="delReport(${i})" style="background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;font-family:inherit;">🗑 删除</button>
          </div>
        </div>`).join('');
}

function delReport(i) {
  const arr = getReports(); arr.splice(i,1); saveReports(arr);
  renderReports();
  if (document.getElementById('reports-grid-home')) renderReportsHome();
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showPage(id) {
  // Sidebar active
  document.querySelectorAll('.sidebar-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.page === id);
  });

  const page = PAGES[id];
  const main = document.getElementById('main-content');

  if (!page) { main.innerHTML = '<div class="empty"><div class="empty-icon">🚧</div><p>页面建设中</p></div>'; return; }

  if (id === 'reports') {
    main.innerHTML = page.render();
    page.after();
    return;
  }

  if (id === 'main') {
    main.innerHTML = page.render();
    page.after();
    return;
  }

  // 通用工具页
  const tools = page.tools || [];
  main.innerHTML = `
    <div class="hero-strip">
      <div>
        <h1>${page.title}</h1>
        <div class="hero-desc">${tools.length} 个工具 · 点击直接打开</div>
      </div>
    </div>
    <div class="cards-grid">
      ${tools.map(t => `
        <a class="tool-card" href="${escHtml(t.url)}" target="_blank">
          <div class="tool-card-top">
            <div class="tool-favicon">
              <img src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(new URL(t.url).hostname)}&sz=32" onerror="this.style.display='none';this.parentElement.textContent='🔗'">
            </div>
            <div class="tool-name">${escHtml(t.name)}</div>
          </div>
          ${t.desc ? `<div class="tool-desc">${escHtml(t.desc)}</div>` : ''}
          <div class="tool-url">${escHtml(new URL(t.url).hostname)}</div>
        </a>`).join('')}
    </div>
  `;
}

// ── 初始化 ──
updateTotalCount();
showPage('main');
